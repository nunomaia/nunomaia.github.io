# Welcome to Jekyll!

remote_theme                :  "mmistakes/minimal-mistakes"
minimal_mistakes_skin       : #"dark"
locale                      : "en-US"
url                         : "https://nunomaia.github.io/" 
baseurl                     : ""
repository                  : "nunomaia/nunomaia.github.io" # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes" 
title                       : "Nuno Maia Dynamics 365 Blog"
subtitle                    : "Finance - Supply Chain - Commerce"
description                 : ""
paginate                    : 5 
paginate_path               : /page:num/

# Social Sharing
twitter:
  username                  : nmsmaia
og_image                    : # Open Graph/Twitter default site image

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/



defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      author_profile: true
      layout: single
      comments: true
      share: true
# _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true


#  Author
author:
  name                      : "Nuno Maia"
  avatar                    : "/assets/images/avatar.png"
  bio                       : ""
  location                  : "Remote / Europe"
  links:
    
    - label                 : "Twitter"
      icon                  : "fab fa-fw fa-twitter"
      url                   : "https://twitter.com/nmsmaia"
    
    - label                 : "GitHub"
      icon                  : "fab fa-fw fa-github"
      url                   : "https://github.com/nunomaia"
    
    - label                 : "LinkedIn"
      icon                  : "fab fa-fw fa-linkedin"
      url                   : "https://www.linkedin.com/in/nuno-maia-35a24b1/"

# Footer

footer:
  links:
    - label                 : "GitHub"
      icon                  : "fab fa-fw fa-github"
      url                   : "https://github.com/nunomaia"

analytics:
  provider                  : "google"
  google:
    tracking_id             : "G-V4F2ZGX94E"
    anonymize_ip            : false # default 

include:
  - _pages         

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache